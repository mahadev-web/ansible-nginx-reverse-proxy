---
  - name: Install base Packages
    dnf:
      name:
        - vim
        - git

      state: present


  - name: Ensure firewalld is installed
    dnf: 
      name: firewalld
      state : present


  - name: Start and enable firewalld
    service:
      name: firewalld
      state: started
      enabled: true 


  - name: Allow SSH
    ansible.posix.firewalld:
      service: ssh
      permanent: true
      state: enabled
      immediate: true

  - name: Allow HTTP
    ansible.posix.firewalld:
      service: http
      permanent: true
      state: enabled
      immediate: true











